<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 扁平化数组
        function flatten01(arr) {
            return arr.flat(Infinity)
        }

        // 使用迭代实现 flatten 扁平化数组
        function flatten02(arr) {
            let result = [];

            for(let i = 0; i < arr.length; i++) {
                if(Array.isArray(arr[i])) {
                    result.push(...flatten02(arr[i]))
                } else {
                    result.push(arr[i])
                }
            }

            return result;
        }

        let arr = [1, [2, [3, [4, [5]]]]]
        console.log(flatten01(arr), 'flatten01');
        console.log(flatten02(arr), 'flatten02');

        
    </script>
</body>
</html>
